<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Inserisci l'età</p>
    <input type="number" id ="eta">
    
    <p>Inserisci i soldi</p>
    <input type="number" id ="soldi">.

    <button onclick="regoleDistributore()">   Compra</button>

    <p id="risultato">......</p>

    <script>

    function regoleDistributore(){

        let eta=document.getElementById("eta").value;
        let soldi=document.getElementById("soldi").value;
        let risultato=document.getElementById("risultato");

           if(eta<18){
               if (soldi>=2)
               risultato.innerHTML="Puoi comprare il succo";
            
            else{
                risultato.innerHTML="Soldi insufficenti";
               }
            }
            else {
            if(soldi>=5)
              { risultato.innerHTML = "Puoi comprare la birra"}
        
            else if(soldi>=2)
             { risultato.innerHTML="Puoi comprare il succo"; }

             else if(soldi>=1)
             { risultato.innerHTML="Puoi comprare un acqua"; }

            else{
                risultato.innerHTML="Soldi insufficienti";
            }

            }

    }

    </script>





</body>
</html>
